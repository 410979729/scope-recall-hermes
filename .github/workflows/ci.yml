name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release-lancedb-py311
            python-version: '3.11'
            install-target: ".[lancedb,dev]"
            command: python scripts/check.release.py
          - name: release-lancedb-py312
            python-version: '3.12'
            install-target: ".[lancedb,dev]"
            command: python scripts/check.release.py
          - name: sqlite-only-no-extras-py312
            python-version: '3.12'
            install-target: '.[dev]'
            command: python -m pytest -q tests/test_optional_vector_deps.py tests/test_sqlite_vector_store.py tests/test_benchmark_regression_cases.py
          - name: vector-disabled-py312
            python-version: '3.12'
            install-target: '.[dev]'
            command: python -m pytest -q tests/test_roadmap_observability.py tests/test_benchmark_regression_cases.py tests/test_provider.py::test_save_config_bootstraps_empty_sqlite_schema
          - name: optional-jieba-missing-py312
            python-version: '3.12'
            install-target: '.[dev]'
            command: python -m pytest -q tests/test_retrieval_rrf_graph.py tests/test_optional_vector_deps.py
          - name: type-check-py312
            python-version: '3.12'
            install-target: '.[dev]'
            command: pyright

    steps:
      - name: Check out scope-recall
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Hermes runtime for plugin tests
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git .hermes-agent-src
          python -m pip install --upgrade pip
          python -m pip install -e .hermes-agent-src

      - name: Install scope-recall lane dependencies
        run: |
          python -m pip install -e "${{ matrix.install-target }}"

      - name: Run lane gate
        env:
          PYTHONPATH: ${{ github.workspace }}/.hermes-agent-src:${{ github.workspace }}
        run: ${{ matrix.command }}
