name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish, e.g. v1.4.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Manual fallback PyPI publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-scope-recall
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve ref
        id: ref
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="$REQUESTED_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9][A-Za-z0-9.-]*)?$ ]]; then
            echo "::error::Invalid release tag: $TAG"
            exit 1
          fi
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          persist-credentials: false

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag} does not match package version {expected}")
          print(f"release tag matches package version: {tag}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Hermes runtime for plugin tests
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git .hermes-agent-src
          python -m pip install --upgrade pip
          python -m pip install -e .hermes-agent-src

      - name: Install release gate tooling
        run: python -m pip install --upgrade pip build ".[lancedb,dev]"

      - name: Run release readiness gate
        env:
          PYTHONPATH: ${{ github.workspace }}/.hermes-agent-src:${{ github.workspace }}
        run: python scripts/check.release.py

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
