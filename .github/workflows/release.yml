name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.5)'
        required: true

jobs:
  release:
    name: Create GitHub Release and publish PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-scope-recall
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve tag
        id: tag
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${REQUESTED_TAG:-$REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9][A-Za-z0-9.-]*)?$ ]]; then
            echo "::error::Invalid release tag: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag} does not match package version {expected}")
          print(f"release tag matches package version: {tag}")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Hermes runtime for plugin tests
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git .hermes-agent-src
          python -m pip install --upgrade pip
          python -m pip install -e .hermes-agent-src

      - name: Install release gate tooling
        run: python -m pip install --upgrade pip build ".[lancedb,dev]"

      - name: Run release readiness gate
        env:
          PYTHONPATH: ${{ github.workspace }}/.hermes-agent-src:${{ github.workspace }}
        run: python scripts/check.release.py

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"

          python3 scripts/extract-changelog.py "$VERSION" CHANGELOG.md release-notes.md

          echo 'notes<<EOF' >> "$GITHUB_OUTPUT"
          cat release-notes.md >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TITLE="scope-recall ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --verify-tag
          fi

      - name: Upload release distributions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release upload "$TAG" dist/* --clobber

      - name: Publish to PyPI
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
